name = "down-under-chauffeur-server"
main = "src/index.ts"
compatibility_date = "2025-06-15"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = true

[env.development]
# Use local D1 (SQLite) when remote dev database is unavailable
remote = false
NODE_ENV = "development"
# Comma-separated origins for dev (web may run on 3001, 3003, etc.)
CORS_ORIGIN = "http://localhost:3001,http://localhost:3002,http://localhost:3003"

# Better Auth
BETTER_AUTH_SECRET="sdNWG3346gApFEayd0QfPFsEjTLcibq2"
BETTER_AUTH_URL="http://localhost:3000"

# Google OAuth
GOOGLE_CLIENT_ID = "REDACTED_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "REDACTED_GOOGLE_CLIENT_SECRET"
GOOGLE_EMAIL_REFRESH_TOKEN = "REDACTED_GOOGLE_REFRESH_TOKEN"
GOOGLE_EMAIL_ACCESS_TOKEN = "REDACTED_GOOGLE_ACCESS_TOKEN"
GOOGLE_EMAIL_USER = "downunderchauffeurs@gmail.com"
GOOGLE_MAPS_API_KEY = "REDACTED_GOOGLE_MAPS_KEY"


# Cloudflare R2
CLOUDFLARE_R2_ACCESS_KEY_ID = "REDACTED_R2_ACCESS_KEY_ID"
CLOUDFLARE_R2_TOKEN_KEY = "REDACTED_R2_TOKEN_KEY"
CLOUDFLARE_R2_SECRET_ACCESS_KEY = "REDACTED_R2_SECRET"
CLOUDFLARE_R2_BUCKET_NAME = "down-under-chauffeur-test-bucket"
CLOUDFLARE_R2_REGION = "oc" # Oceania
CLOUDFLARE_R2_S3_ENDPOINT = "REDACTED_R2_ENDPOINT"
CLOUDFLARE_R2_PUBLIC_URL = "REDACTED_R2_PUBLIC_URL"

# Local D1 for development (SQLite file in .wrangler/state/v3/d1/)
# Use: pnpm dev (runs wrangler dev --env development)
# database_id required for wrangler d1 execute --local to find the DB
[[env.development.d1_databases]]
binding = "DB"
database_name = "down-under-chauffeur-test-db"
database_id = "8682a4c3-fcc3-4435-9a31-1b710dd1a673"
migrations_dir = "./drizzle/migrations/sqlite"
remote = false

# Local R2 for development (when using remote=false)
[[env.development.r2_buckets]]
binding = "BUCKET"
bucket_name = "down-under-chauffeur-test-bucket"
preview_bucket_name = "down-under-chauffeur-test-bucket"
remote = false

# Deployed dev environment - uses my-dev-db, domain-style URLs (dev.downunderchauffeurs.com)
[env.dev.vars]
NODE_ENV = "development"
CORS_ORIGIN = "https://down-under-chauffeur-dev.luppy.workers.dev,http://localhost:3001,http://localhost:3002,http://localhost:3003"

# Better Auth
BETTER_AUTH_SECRET = "sdNWG3346gApFEayd0QfPFsEjTLcibq2"
BETTER_AUTH_URL = "https://down-under-chauffeur-server-dev.luppy.workers.dev"

# Google OAuth
GOOGLE_CLIENT_ID = "REDACTED_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "REDACTED_GOOGLE_CLIENT_SECRET"
GOOGLE_EMAIL_REFRESH_TOKEN = "REDACTED_GOOGLE_REFRESH_TOKEN"
GOOGLE_EMAIL_ACCESS_TOKEN = "REDACTED_GOOGLE_ACCESS_TOKEN"
GOOGLE_EMAIL_USER = "downunderchauffeurs@gmail.com"
GOOGLE_MAPS_API_KEY = "REDACTED_GOOGLE_MAPS_KEY"

# Cloudflare R2 (use test bucket for dev)
CLOUDFLARE_R2_ACCESS_KEY_ID = "REDACTED_R2_ACCESS_KEY_ID"
CLOUDFLARE_R2_TOKEN_KEY = "REDACTED_R2_TOKEN_KEY"
CLOUDFLARE_R2_SECRET_ACCESS_KEY = "REDACTED_R2_SECRET"
CLOUDFLARE_R2_BUCKET_NAME = "down-under-chauffeur-test-bucket"
CLOUDFLARE_R2_REGION = "oc"
CLOUDFLARE_R2_S3_ENDPOINT = "REDACTED_R2_ENDPOINT"
CLOUDFLARE_R2_PUBLIC_URL = "REDACTED_R2_PUBLIC_URL"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "my-dev-db"
database_id = "38bee8af-29e6-43ed-9bd4-3bff0f95f325"
migrations_dir = "./drizzle/migrations/sqlite"

[[env.dev.r2_buckets]]
binding = "BUCKET"
bucket_name = "down-under-chauffeur-test-bucket"
preview_bucket_name = "down-under-chauffeur-test-bucket"

[[d1_databases]]
binding = "DB"
database_name = "down-under-chauffeur-test-db"
database_id = "8682a4c3-fcc3-4435-9a31-1b710dd1a673"
preview_database_id = "8682a4c3-fcc3-4435-9a31-1b710dd1a673"
migrations_dir = "./drizzle/migrations/sqlite"
remote = true

[[r2_buckets]]
binding = 'BUCKET'
bucket_name = 'down-under-chauffeur-test-bucket'
preview_bucket_name = 'down-under-chauffeur-test-bucket'
remote = true

[env.staging.vars]
# Staging = development (account 8357cb0b, my-dev-db)
NODE_ENV = "development"
# Explicit staging web origin - must match exactly for CORS
CORS_ORIGIN = "https://down-under-chauffeur-staging.downunderchauffeurs.workers.dev"

# Better Auth (Safari iOS: cross-subdomain cookies for email/password login)
BETTER_AUTH_SECRET="sdNWG3346gApFEayd0QfPFsEjTLcibq2"
BETTER_AUTH_URL="https://down-under-chauffeur-server-staging.downunderchauffeurs.workers.dev"
COOKIE_DOMAIN="downunderchauffeurs.workers.dev"

GOOGLE_CLIENT_ID = "REDACTED_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "REDACTED_GOOGLE_CLIENT_SECRET"
GOOGLE_EMAIL_REFRESH_TOKEN = "REDACTED_GOOGLE_REFRESH_TOKEN"
GOOGLE_EMAIL_ACCESS_TOKEN = "REDACTED_GOOGLE_ACCESS_TOKEN"
GOOGLE_EMAIL_USER = "downunderchauffeurs@gmail.com"
GOOGLE_MAPS_API_KEY = "REDACTED_GOOGLE_MAPS_KEY"


# Cloudflare R2
CLOUDFLARE_R2_ACCESS_KEY_ID = "REDACTED_R2_ACCESS_KEY_ID"
CLOUDFLARE_R2_TOKEN_KEY = "REDACTED_R2_TOKEN_KEY"
CLOUDFLARE_R2_SECRET_ACCESS_KEY = "REDACTED_R2_SECRET"
CLOUDFLARE_R2_BUCKET_NAME = "down-under-chauffeur-bucket"
CLOUDFLARE_R2_REGION = "oc" # Oceania
CLOUDFLARE_R2_S3_ENDPOINT = "https://8357cb0b206399da0d4027d5f6961df9.r2.cloudflarestorage.com/down-under-chauffeur-bucket"
CLOUDFLARE_R2_PUBLIC_URL = "https://pub-445ebbef9ad84db0b81b54e22dde1343.r2.dev"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "my-dev-db"
database_id = "38bee8af-29e6-43ed-9bd4-3bff0f95f325"
preview_database_id = "38bee8af-29e6-43ed-9bd4-3bff0f95f325"
migrations_dir = "./drizzle/migrations/sqlite"

[[env.staging.r2_buckets]]
