# Utos & Co — Cloudflare account: d65ec7164ebba9b829f909d28eaf3ebf
# Run `wrangler login` and select this account before deploy / d1 create / r2 bucket create.
# D1/R2 resource names in account: otus-and-co-staging, otus-and-co-production (UUIDs below).
#      Create an R2 API token (Read+Write), set CLOUDFLARE_R2_* below; set public URL from bucket settings.
name = "utos-and-co-server"
main = "src/index.ts"
compatibility_date = "2025-06-15"
compatibility_flags = ["nodejs_compat"]
account_id = "d65ec7164ebba9b829f909d28eaf3ebf"

[observability.logs]
enabled = true

[env.development]
# Use local D1 (SQLite) when remote dev database is unavailable
remote = false
NODE_ENV = "development"
SITE_URL = "http://localhost:3001"
# Comma-separated origins for dev (web may run on 3001, 3003, etc.)
CORS_ORIGIN = "http://localhost:3001,http://localhost:3002,http://localhost:3003"

# Better Auth
BETTER_AUTH_SECRET="sdNWG3346gApFEayd0QfPFsEjTLcibq2"
BETTER_AUTH_URL="http://localhost:3000"

# Google OAuth
GOOGLE_CLIENT_ID = "REDACTED_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "REDACTED_GOOGLE_CLIENT_SECRET"
GOOGLE_EMAIL_REFRESH_TOKEN = "REDACTED_GOOGLE_REFRESH_TOKEN"
GOOGLE_EMAIL_ACCESS_TOKEN = "REDACTED_GOOGLE_ACCESS_TOKEN"
GOOGLE_EMAIL_USER = "downunderchauffeurs@gmail.com"
GOOGLE_MAPS_API_KEY = "REDACTED_GOOGLE_MAPS_KEY"

# Square Payments (local dev - add SQUARE_ACCESS_TOKEN to .dev.vars)
SQUARE_APPLICATION_ID = "sandbox-sq0idb-NIoQ14HVzSUecRSlgTsM3w"
SQUARE_LOCATION_ID = "L8P964X218027"
SQUARE_ENVIRONMENT = "sandbox"

# Cloudflare R2
CLOUDFLARE_R2_ACCESS_KEY_ID = "REDACTED_R2_ACCESS_KEY_ID"
CLOUDFLARE_R2_TOKEN_KEY = "REDACTED_R2_TOKEN_KEY"
CLOUDFLARE_R2_SECRET_ACCESS_KEY = "REDACTED_R2_SECRET"
CLOUDFLARE_R2_BUCKET_NAME = "down-under-chauffeur-test-bucket"
CLOUDFLARE_R2_REGION = "oc" # Oceania
CLOUDFLARE_R2_S3_ENDPOINT = "REDACTED_R2_ENDPOINT"
CLOUDFLARE_R2_PUBLIC_URL = "REDACTED_R2_PUBLIC_URL"

# Local D1 for development (SQLite file in .wrangler/state/v3/d1/)
# Use: pnpm dev (runs wrangler dev --env development)
# database_id required for wrangler d1 execute --local to find the DB
[[env.development.d1_databases]]
binding = "DB"
database_name = "down-under-chauffeur-test-db"
database_id = "8682a4c3-fcc3-4435-9a31-1b710dd1a673"
migrations_dir = "./drizzle/migrations/sqlite"
remote = false

# Local R2 for development (when using remote=false)
[[env.development.r2_buckets]]
binding = "BUCKET"
bucket_name = "down-under-chauffeur-test-bucket"
preview_bucket_name = "down-under-chauffeur-test-bucket"
remote = false

# Optional legacy "dev" env — aligned with staging URLs
[env.dev.vars]
NODE_ENV = "development"
SITE_URL = "https://utos-and-co-staging.utosandco.workers.dev"
CORS_ORIGIN = "https://utos-and-co-staging.utosandco.workers.dev,http://localhost:3001,http://localhost:3002,http://localhost:3003"

# Better Auth
BETTER_AUTH_SECRET = "sdNWG3346gApFEayd0QfPFsEjTLcibq2"
BETTER_AUTH_URL = "https://utos-and-co-server-staging.utosandco.workers.dev"

# Google OAuth
GOOGLE_CLIENT_ID = "REDACTED_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "REDACTED_GOOGLE_CLIENT_SECRET"
GOOGLE_EMAIL_REFRESH_TOKEN = "REDACTED_GOOGLE_REFRESH_TOKEN"
GOOGLE_EMAIL_ACCESS_TOKEN = "REDACTED_GOOGLE_ACCESS_TOKEN"
GOOGLE_EMAIL_USER = "downunderchauffeurs@gmail.com"
GOOGLE_MAPS_API_KEY = "REDACTED_GOOGLE_MAPS_KEY"

# Cloudflare R2 — same as staging when using --env dev
CLOUDFLARE_R2_ACCESS_KEY_ID = "REPLACE_ME_R2_ACCESS_KEY_ID"
CLOUDFLARE_R2_TOKEN_KEY = "REPLACE_ME_R2_TOKEN_KEY"
CLOUDFLARE_R2_SECRET_ACCESS_KEY = "REPLACE_ME_R2_SECRET_ACCESS_KEY"
CLOUDFLARE_R2_BUCKET_NAME = "otus-and-co-staging"
CLOUDFLARE_R2_REGION = "oc"
# Account S3 API root (bucket is CLOUDFLARE_R2_BUCKET_NAME; same endpoint for staging/prod)
CLOUDFLARE_R2_S3_ENDPOINT = "https://d65ec7164ebba9b829f909d28eaf3ebf.r2.cloudflarestorage.com"
CLOUDFLARE_R2_PUBLIC_URL = "REPLACE_ME_R2_PUBLIC_URL"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "otus-and-co-staging"
database_id = "66d0f447-99d1-4cb6-907d-f3eca66fdf33"
migrations_dir = "./drizzle/migrations/sqlite"

[[env.dev.r2_buckets]]
binding = "BUCKET"
bucket_name = "otus-and-co-staging"
preview_bucket_name = "otus-and-co-staging"

# Default remote bindings (wrangler d1 without --env) — same as staging
[[d1_databases]]
binding = "DB"
database_name = "otus-and-co-staging"
database_id = "66d0f447-99d1-4cb6-907d-f3eca66fdf33"
preview_database_id = "66d0f447-99d1-4cb6-907d-f3eca66fdf33"
migrations_dir = "./drizzle/migrations/sqlite"
remote = true

[[r2_buckets]]
binding = 'BUCKET'
bucket_name = 'otus-and-co-staging'
preview_bucket_name = 'otus-and-co-staging'
remote = true

[env.staging]
name = "utos-and-co-server-staging"

[env.staging.vars]
# Staging — *.utosandco.workers.dev (account subdomain)
NODE_ENV = "development"
SITE_URL = "https://utos-and-co-staging.utosandco.workers.dev"
CORS_ORIGIN = "https://utos-and-co-staging.utosandco.workers.dev,https://utosandco.com,https://www.utosandco.com,http://localhost:3001,http://localhost:3002,http://localhost:3003"

# Better Auth — set COOKIE_DOMAIN in production for api + app on utosandco.com (see env.production)
BETTER_AUTH_SECRET="sdNWG3346gApFEayd0QfPFsEjTLcibq2"
BETTER_AUTH_URL="https://utos-and-co-server-staging.utosandco.workers.dev"

GOOGLE_CLIENT_ID = "REDACTED_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "REDACTED_GOOGLE_CLIENT_SECRET"
GOOGLE_EMAIL_REFRESH_TOKEN = "REDACTED_GOOGLE_REFRESH_TOKEN"
