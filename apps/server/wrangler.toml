[env.production.vars]
NODE_ENV = "production"
CORS_ORIGIN = "https://downunderchauffeurs.com"

# Better Auth (Safari iOS: cross-subdomain cookies for email/password login)
BETTER_AUTH_SECRET="sdNWG3346gApFEayd0QfPFsEjTLcibq2"
BETTER_AUTH_URL="https://api.downunderchauffeurs.com"
COOKIE_DOMAIN="downunderchauffeurs.com"

# Google OAuth
GOOGLE_CLIENT_ID = "REDACTED_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "REDACTED_GOOGLE_CLIENT_SECRET"
GOOGLE_EMAIL_REFRESH_TOKEN = "REDACTED_GOOGLE_REFRESH_TOKEN"
GOOGLE_EMAIL_ACCESS_TOKEN = "REDACTED_GOOGLE_ACCESS_TOKEN"
GOOGLE_EMAIL_USER = "downunderchauffeurs@gmail.com"
GOOGLE_MAPS_API_KEY = "REDACTED_GOOGLE_MAPS_KEY"

# Cloudflare R2
CLOUDFLARE_R2_TOKEN_KEY = "REDACTED_R2_TOKEN_KEY"
CLOUDFLARE_R2_ACCESS_KEY_ID = "REDACTED_R2_ACCESS_KEY_ID"
CLOUDFLARE_R2_SECRET_ACCESS_KEY = "REDACTED_R2_SECRET"
CLOUDFLARE_R2_BUCKET_NAME = "downunderchauffeurs-bucket"
CLOUDFLARE_R2_REGION = "oc" # Oceania
CLOUDFLARE_R2_S3_ENDPOINT = "https://8357cb0b206399da0d4027d5f6961df9.r2.cloudflarestorage.com/downunderchauffeurs-bucket"
CLOUDFLARE_R2_PUBLIC_URL = "https://cdn.downunderchauffeurs.com/downunderchauffeurs-bucket"

[[env.production.routes]]
pattern = "api.downunderchauffeurs.com"
custom_domain = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "downunderchauffeurs-db"
database_id = "e03c212d-bd91-46ca-a218-1950cbb1e4ea"
preview_database_id = "8682a4c3-fcc3-4435-9a31-1b710dd1a673"
migrations_dir = "./drizzle/migrations/sqlite"

[[env.production.r2_buckets]]
